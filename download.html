<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Télécharger Wapply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    p { color: #666; font-size: 15px; margin-bottom: 32px; }
    .btn {
      display: block;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-apple { background: #000; color: #fff; }
    .btn-android { background: #01875f; color: #fff; }
    .redirect-msg { color: #999; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Wapply</h1>
    <p>L'app qui matche avec ton job.<br>Postule en 1 swipe.</p>
    <a class="btn btn-apple" href="https://apps.apple.com/app/wapply/id6470459143">
      🍎 App Store (iOS)
    </a>
    <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.midljob">
      🤖 Google Play (Android)
    </a>
    <p class="redirect-msg" id="msg"></p>
  </div>

  <script>
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /android/i.test(ua);

    if (isIOS) {
      document.getElementById('msg').textContent = 'Redirection vers l\'App Store...';
      setTimeout(() => {
        window.location.href = 'https://apps.apple.com/app/wapply/id6470459143';
      }, 800);
    } else if (isAndroid) {
      document.getElementById('msg').textContent = 'Redirection vers Google Play...';
      setTimeout(() => {
        window.location.href = 'https://play.google.com/store/apps/details?id=com.midljob';
      }, 800);
    }
  </script>
</body>
</html>
